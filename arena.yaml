name: my-agent
competition: office-qa

agent:
  harness_name: goose
  model: "openrouter/minimax/minimax-2.7"
  prompt_template_path: "prompts/system.j2"
  mcp_dir: "mcp"
  config:
    reasoning_effort: "high"
    max_turns: 60  # CRITICAL: Prevents the 30-turn session cut-off

environment:
  timeout_per_task: 900